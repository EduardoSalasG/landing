  <style>
    :root {
      color-scheme: light;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-text: #0f172a;
      --color-muted: #64748b;
      --color-border: #e2e8f0;
      --color-navy: #001f3f;
      --color-navy-hover: #003366;
      --color-focus: #1d4ed8;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--color-bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(0, 31, 63, 0.06), transparent 34rem),
        var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .hub {
      width: min(100%, 520px);
    }

    .profile {
      margin-bottom: 28px;
      text-align: center;
    }

    .avatar {
      display: inline-grid;
      width: 82px;
      height: 82px;
      place-items: center;
      border: 1px solid var(--color-border);
      border-radius: 50%;
      background: var(--color-surface);
      color: var(--color-navy);
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 18px 0 6px;
      color: var(--color-text);
      font-size: clamp(2rem, 9vw, 3rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--color-muted);
      font-size: 1rem;
    }

    main {
      display: grid;
      gap: 14px;
    }

    .section {
      overflow: hidden;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }

    .toggle {
      display: flex;
      width: 100%;
      min-height: 60px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 0;
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      padding: 0 18px;
      text-align: left;
    }

    .toggle:hover {
      color: var(--color-navy-hover);
    }

    .toggle:focus-visible,
    .link:focus-visible {
      outline: 3px solid var(--color-focus);
      outline-offset: 3px;
    }

    .indicator {
      display: grid;
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      color: var(--color-navy);
      font-size: 1.1rem;
      font-weight: 800;
      line-height: 1;
    }

    .panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 180ms ease;
    }

    .section[data-open="true"] .panel {
      grid-template-rows: 1fr;
    }

    .panel-inner {
      min-height: 0;
      overflow: hidden;
    }

    .links {
      display: grid;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .nested-section {
      border-radius: 8px;
      box-shadow: none;
    }

    .nested-section .links {
      padding-top: 0;
    }

    .link {
      display: flex;
      min-height: 52px;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
      color: var(--color-text);
      font-weight: 650;
      padding: 0 16px;
      transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .link-label {
      display: inline-flex;
      min-width: 0;
      align-items: center;
      gap: 12px;
    }

    .playlist-cover {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-bg);
      object-fit: cover;
    }

    .link:hover {
      border-color: rgba(0, 31, 63, 0.34);
      color: var(--color-navy-hover);
      transform: translateY(-1px);
    }

    .link span:last-child {
      color: var(--color-muted);
      font-size: 1rem;
    }

    footer {
      margin-top: 28px;
      color: var(--color-muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    @media (max-width: 420px) {
      .page {
        align-items: flex-start;
        padding-top: 28px;
      }

      .avatar {
        width: 74px;
        height: 74px;
      }

      .toggle,
      .link {
        min-height: 56px;
      }
    }
  </style>
</head>

  <script>
    window.dataLayer = window.dataLayer || [];

    function trackEvent(payload) {
      window.dataLayer.push(payload);
    }

    trackEvent({
      event: "page_metadata",
      page_type: "landing",
      page_title: document.title,
      page_path: location.pathname
    });

    document.querySelectorAll(".section").forEach((section) => {
      const button = section.querySelector(".toggle");
      const indicator = section.querySelector(".indicator");

      button.addEventListener("click", () => {
        const isOpen = button.getAttribute("aria-expanded") === "true";
        const nextState = String(!isOpen);

        button.setAttribute("aria-expanded", nextState);
        section.dataset.open = nextState;
        indicator.textContent = isOpen ? "+" : "-";
        trackEvent({
          event: "accordion_toggle",
          accordion_name: button.querySelector("span")?.textContent?.trim() || "unknown",
          accordion_state: nextState === "true" ? "open" : "closed"
        });
      });
    });

    document.addEventListener("click", (e) => {
      const link = e.target.closest("a[href]");
      if (!link) return;
      const label = (link.textContent || "").trim().replace(/\s+/g, " ").slice(0, 120);
      const href = link.getAttribute("href") || "";
      const section = link.closest(".section");
      const sectionName = section?.querySelector(".toggle span")?.textContent?.trim() || "none";

      trackEvent({
        event: "outbound_link_click",
        link_text: label || "no_text",
        link_url: href || "no_href",
        link_group: sectionName
      });
    });
  </script>
